<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cloud Drive</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Main Card */
.container {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 30px;
    width: 480px;
    color: white;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    text-align: center;
}

/* Title */
h1 {
    margin-bottom: 20px;
}

/* Drop Area */
.drop-area {
    border: 2px dashed white;
    padding: 25px;
    border-radius: 10px;
    margin-bottom: 15px;
    cursor: pointer;
}

/* File Input Center */
.file-input {
    display: flex;
    justify-content: center;
    margin: 10px 0;
}

/* Button Group */
.btn-group {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 15px 0;
}

/* Buttons */
button {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    background: #00c6ff;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0072ff;
}

/* Progress */
.progress {
    width: 100%;
    height: 10px;
    background: rgba(255,255,255,0.3);
    border-radius: 5px;
    overflow: hidden;
    margin-top: 10px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ff9f;
}

/* File Cards */
#files {
    margin-top: 15px;
}

.file-card {
    background: rgba(255,255,255,0.2);
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.file-card button {
    background: red;
}
</style>

</head>

<body>

<div class="container">

<h1>☁️ Angelin Cloud Drive</h1>

<div class="drop-area" id="drop">
    Drag & Drop File Here
</div>

<div class="file-input">
    <input type="file" id="file">
</div>

<div class="btn-group">
    <button onclick="upload()">Upload</button>
    <button onclick="loadFiles()">Refresh</button>
</div>

<div class="progress">
    <div class="progress-bar" id="bar"></div>
</div>

<div id="files"></div>

</div>

<script>

let selectedFile = null

const drop = document.getElementById("drop")

drop.addEventListener("dragover", e=>{
    e.preventDefault()
    drop.style.background = "rgba(255,255,255,0.3)"
})

drop.addEventListener("dragleave", ()=>{
    drop.style.background = "transparent"
})

drop.addEventListener("drop", e=>{
    e.preventDefault()
    selectedFile = e.dataTransfer.files[0]
    drop.innerHTML = selectedFile.name
})

document.getElementById("file").addEventListener("change", function(){
    selectedFile = this.files[0]
})

function upload(){

if(!selectedFile){
    alert("Select file first!")
    return
}

const formData = new FormData()
formData.append("file", selectedFile)

const xhr = new XMLHttpRequest()

xhr.open("POST", "http://localhost:3000/upload")

xhr.upload.onprogress = function(e){
    const percent = (e.loaded / e.total) * 100
    document.getElementById("bar").style.width = percent + "%"
}

xhr.onload = function(){
    alert("✅ Uploaded!")
    loadFiles()
}

xhr.send(formData)

}

async function loadFiles(){

const res = await fetch("http://localhost:3000/files")
const data = await res.json()

const div = document.getElementById("files")
div.innerHTML = ""

data.forEach(f=>{
    div.innerHTML += `
    <div class="file-card">
        <span>${f.Key}</span>
        <div>
            <button onclick="download('${f.Key}')">⬇</button>
            <button onclick="deleteFile('${f.Key}')">❌</button>
        </div>
    </div>
    `
})

}

async function download(key){
const res = await fetch(`http://localhost:3000/download/${key}`)
const url = await res.text()
window.open(url)
}

async function deleteFile(key){
await fetch(`http://localhost:3000/delete/${key}`,{method:"DELETE"})
loadFiles()
}

</script>

</body>
</html>
